<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rvBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0e0a08"/>
    </linearGradient>
    <linearGradient id="rvFelt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f5c3a"/>
      <stop offset="100%" stop-color="#0e3b22"/>
    </linearGradient>
    <linearGradient id="rvFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a2c1a"/>
      <stop offset="100%" stop-color="#2a1a10"/>
    </linearGradient>
    <radialGradient id="rvWhite" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9c5be"/>
    </radialGradient>
    <radialGradient id="rvBlack" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="rvFlip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#888"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#rvBg)"/>

  <!-- Wood frame around the felt -->
  <rect x="100" y="20" width="200" height="200" rx="6" fill="url(#rvFrame)"/>
  <!-- Felt -->
  <rect x="108" y="28" width="184" height="184" rx="3" fill="url(#rvFelt)"/>

  <!-- 8x8 grid lines -->
  <g stroke="rgba(0,0,0,0.55)" stroke-width="1">
    <line x1="108" y1="51" x2="292" y2="51"/>
    <line x1="108" y1="74" x2="292" y2="74"/>
    <line x1="108" y1="97" x2="292" y2="97"/>
    <line x1="108" y1="120" x2="292" y2="120"/>
    <line x1="108" y1="143" x2="292" y2="143"/>
    <line x1="108" y1="166" x2="292" y2="166"/>
    <line x1="108" y1="189" x2="292" y2="189"/>

    <line x1="131" y1="28" x2="131" y2="212"/>
    <line x1="154" y1="28" x2="154" y2="212"/>
    <line x1="177" y1="28" x2="177" y2="212"/>
    <line x1="200" y1="28" x2="200" y2="212"/>
    <line x1="223" y1="28" x2="223" y2="212"/>
    <line x1="246" y1="28" x2="246" y2="212"/>
    <line x1="269" y1="28" x2="269" y2="212"/>
  </g>

  <!-- Discs (mid-game arrangement, with one mid-flip) -->
  <!-- columns x: 119,142,165,188,211,234,257,280  rows y: 39,62,85,108,131,154,177,200 -->
  <!-- Row 4 (108): black W W black -->
  <circle cx="188" cy="108" r="9" fill="url(#rvBlack)"/>
  <circle cx="211" cy="108" r="9" fill="url(#rvWhite)"/>
  <!-- Row 5 (131): center white-black flanked -->
  <circle cx="188" cy="131" r="9" fill="url(#rvWhite)"/>
  <circle cx="211" cy="131" r="9" fill="url(#rvBlack)"/>

  <!-- Surrounding stones -->
  <circle cx="165" cy="108" r="9" fill="url(#rvBlack)"/>
  <circle cx="234" cy="108" r="9" fill="url(#rvWhite)"/>
  <circle cx="142" cy="131" r="9" fill="url(#rvBlack)"/>
  <circle cx="165" cy="131" r="9" fill="url(#rvBlack)"/>
  <circle cx="234" cy="131" r="9" fill="url(#rvWhite)"/>
  <circle cx="257" cy="131" r="9" fill="url(#rvWhite)"/>

  <!-- Row 3 corner play -->
  <circle cx="142" cy="85" r="9" fill="url(#rvBlack)"/>
  <circle cx="165" cy="85" r="9" fill="url(#rvWhite)"/>
  <circle cx="234" cy="85" r="9" fill="url(#rvBlack)"/>

  <!-- Row 6 -->
  <circle cx="188" cy="154" r="9" fill="url(#rvWhite)"/>
  <circle cx="211" cy="154" r="9" fill="url(#rvBlack)"/>
  <circle cx="234" cy="154" r="9" fill="url(#rvBlack)"/>

  <!-- Mid-flip disc (visual flourish) — narrow ellipse with linear gradient -->
  <ellipse cx="142" cy="154" rx="3" ry="9" fill="url(#rvFlip)"/>

  <!-- Title chip top-left -->
  <g transform="translate(16, 16)">
    <rect width="92" height="22" rx="4" fill="rgba(0,0,0,0.55)" stroke="rgba(245,196,81,0.5)" stroke-width="1"/>
    <text x="46" y="15" text-anchor="middle" font-family="EB Garamond, serif" font-size="11" letter-spacing="3" font-weight="700" fill="#f5c451">REVERSI · 8×8</text>
  </g>
</svg>
