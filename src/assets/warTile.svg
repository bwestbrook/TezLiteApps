<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wrBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#190857"/>
      <stop offset="100%" stop-color="#07041e"/>
    </linearGradient>
    <linearGradient id="wrFelt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f5c3a"/>
      <stop offset="100%" stop-color="#0e3b22"/>
    </linearGradient>
    <linearGradient id="wrBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#190857"/>
      <stop offset="100%" stop-color="#2a1577"/>
    </linearGradient>
    <radialGradient id="wrGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgba(245,196,81,0.18)"/>
      <stop offset="100%" stop-color="rgba(245,196,81,0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="240" fill="url(#wrBg)"/>
  <ellipse cx="200" cy="125" rx="170" ry="100" fill="url(#wrFelt)" opacity="0.5"/>
  <ellipse cx="200" cy="125" rx="120" ry="60" fill="url(#wrGlow)"/>

  <!-- Two facing piles of 5 cards each, fanned slightly -->
  <!-- Opponent (top) — face cards, fanned -->
  <g transform="translate(100, 32)">
    <g transform="rotate(-14)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#c4524f">A♥</text>
      <text x="14" y="28" text-anchor="end" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#c4524f" transform="rotate(180, 14, 24)">A♥</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="26" fill="#c4524f">♥</text>
    </g>
    <g transform="translate(28, 0) rotate(-6)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#1a1a1a">K♠</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="26" fill="#1a1a1a">♠</text>
    </g>
    <g transform="translate(56, 4) rotate(2)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#c4524f">Q♦</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="26" fill="#c4524f">♦</text>
    </g>
    <g transform="translate(84, 0) rotate(10)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#1a1a1a">J♣</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="26" fill="#1a1a1a">♣</text>
    </g>
    <g transform="translate(112, 6) rotate(18)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#c4524f">10♥</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#c4524f">♥</text>
    </g>
  </g>

  <!-- VS in middle -->
  <g transform="translate(200, 120)">
    <circle r="22" fill="rgba(0,0,0,0.6)" stroke="#f5c451" stroke-width="1.5"/>
    <text text-anchor="middle" y="5" font-family="EB Garamond, serif" font-size="14" font-weight="700" letter-spacing="2" fill="#f5c451">VS</text>
  </g>

  <!-- You (bottom) — different cards, fanned the other way -->
  <g transform="translate(100, 184)">
    <g transform="rotate(-18)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#1a1a1a">9♠</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#1a1a1a">♠</text>
    </g>
    <g transform="translate(28, -4) rotate(-8)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#c4524f">7♦</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#c4524f">♦</text>
    </g>
    <g transform="translate(56, -6) rotate(0)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#c4524f">5♥</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#c4524f">♥</text>
    </g>
    <g transform="translate(84, -4) rotate(8)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#1a1a1a">3♣</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#1a1a1a">♣</text>
    </g>
    <g transform="translate(112, 0) rotate(18)">
      <rect x="-22" y="-30" width="44" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="0.5"/>
      <text x="-14" y="-15" font-family="EB Garamond, serif" font-size="11" font-weight="700" fill="#1a1a1a">2♠</text>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="22" fill="#1a1a1a">♠</text>
    </g>
  </g>

  <!-- Title chip top-left -->
  <g transform="translate(16, 16)">
    <rect width="100" height="22" rx="4" fill="rgba(0,0,0,0.55)" stroke="rgba(245,196,81,0.5)" stroke-width="1"/>
    <text x="50" y="15" text-anchor="middle" font-family="EB Garamond, serif" font-size="11" letter-spacing="3" font-weight="700" fill="#f5c451">WAR · 5-CARD</text>
  </g>
</svg>
