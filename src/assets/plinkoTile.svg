<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="plBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#190857"/>
      <stop offset="100%" stop-color="#07041e"/>
    </linearGradient>
    <radialGradient id="plBall" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#fff8d9"/>
      <stop offset="40%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#a06c12"/>
    </radialGradient>
    <linearGradient id="plPeg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="plSlotEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#a06c12"/>
    </linearGradient>
    <linearGradient id="plSlotMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#plBg)"/>

  <!-- Soft glow behind the playfield -->
  <ellipse cx="200" cy="120" rx="160" ry="90" fill="rgba(245,196,81,0.06)"/>

  <!-- Pegs: 8 rows triangular array, centered -->
  <!-- Top row 3 pegs, growing down to 10 pegs at row 8 -->
  <g fill="url(#plPeg)">
    <!-- Row 1 (3 pegs) y=44 -->
    <circle cx="180" cy="44" r="2.6"/>
    <circle cx="200" cy="44" r="2.6"/>
    <circle cx="220" cy="44" r="2.6"/>
    <!-- Row 2 (4) y=62 -->
    <circle cx="170" cy="62" r="2.6"/>
    <circle cx="190" cy="62" r="2.6"/>
    <circle cx="210" cy="62" r="2.6"/>
    <circle cx="230" cy="62" r="2.6"/>
    <!-- Row 3 (5) y=80 -->
    <circle cx="160" cy="80" r="2.6"/>
    <circle cx="180" cy="80" r="2.6"/>
    <circle cx="200" cy="80" r="2.6"/>
    <circle cx="220" cy="80" r="2.6"/>
    <circle cx="240" cy="80" r="2.6"/>
    <!-- Row 4 (6) y=98 -->
    <circle cx="150" cy="98" r="2.6"/>
    <circle cx="170" cy="98" r="2.6"/>
    <circle cx="190" cy="98" r="2.6"/>
    <circle cx="210" cy="98" r="2.6"/>
    <circle cx="230" cy="98" r="2.6"/>
    <circle cx="250" cy="98" r="2.6"/>
    <!-- Row 5 (7) y=116 -->
    <circle cx="140" cy="116" r="2.6"/>
    <circle cx="160" cy="116" r="2.6"/>
    <circle cx="180" cy="116" r="2.6"/>
    <circle cx="200" cy="116" r="2.6"/>
    <circle cx="220" cy="116" r="2.6"/>
    <circle cx="240" cy="116" r="2.6"/>
    <circle cx="260" cy="116" r="2.6"/>
    <!-- Row 6 (8) y=134 -->
    <circle cx="130" cy="134" r="2.6"/>
    <circle cx="150" cy="134" r="2.6"/>
    <circle cx="170" cy="134" r="2.6"/>
    <circle cx="190" cy="134" r="2.6"/>
    <circle cx="210" cy="134" r="2.6"/>
    <circle cx="230" cy="134" r="2.6"/>
    <circle cx="250" cy="134" r="2.6"/>
    <circle cx="270" cy="134" r="2.6"/>
    <!-- Row 7 (9) y=152 -->
    <circle cx="120" cy="152" r="2.6"/>
    <circle cx="140" cy="152" r="2.6"/>
    <circle cx="160" cy="152" r="2.6"/>
    <circle cx="180" cy="152" r="2.6"/>
    <circle cx="200" cy="152" r="2.6"/>
    <circle cx="220" cy="152" r="2.6"/>
    <circle cx="240" cy="152" r="2.6"/>
    <circle cx="260" cy="152" r="2.6"/>
    <circle cx="280" cy="152" r="2.6"/>
    <!-- Row 8 (10) y=170 -->
    <circle cx="110" cy="170" r="2.6"/>
    <circle cx="130" cy="170" r="2.6"/>
    <circle cx="150" cy="170" r="2.6"/>
    <circle cx="170" cy="170" r="2.6"/>
    <circle cx="190" cy="170" r="2.6"/>
    <circle cx="210" cy="170" r="2.6"/>
    <circle cx="230" cy="170" r="2.6"/>
    <circle cx="250" cy="170" r="2.6"/>
    <circle cx="270" cy="170" r="2.6"/>
    <circle cx="290" cy="170" r="2.6"/>
  </g>

  <!-- Slot row at the bottom: 11 slots, edges gold (29×), middle dark -->
  <g>
    <rect x="100" y="186" width="18" height="34" rx="2" fill="url(#plSlotEdge)"/>
    <rect x="118" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="136" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="154" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="172" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="190" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="208" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="226" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="244" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="262" y="186" width="18" height="34" rx="2" fill="url(#plSlotMid)"/>
    <rect x="280" y="186" width="18" height="34" rx="2" fill="url(#plSlotEdge)"/>
  </g>
  <g font-family="EB Garamond, serif" font-weight="700" font-size="9" fill="#0e1116" text-anchor="middle">
    <text x="109" y="207">29×</text>
    <text x="289" y="207">29×</text>
  </g>
  <g font-family="EB Garamond, serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    <text x="127" y="207">.4</text>
    <text x="145" y="207">.6</text>
    <text x="163" y="207">.9</text>
    <text x="181" y="207">1.2</text>
    <text x="199" y="207">1.5</text>
    <text x="217" y="207">1.2</text>
    <text x="235" y="207">.9</text>
    <text x="253" y="207">.6</text>
    <text x="271" y="207">.4</text>
  </g>

  <!-- Falling ball with motion trail -->
  <g opacity="0.35"><circle cx="200" cy="22" r="6" fill="url(#plBall)"/></g>
  <g opacity="0.55"><circle cx="195" cy="62" r="6" fill="url(#plBall)"/></g>
  <g opacity="0.85"><circle cx="180" cy="100" r="6.5" fill="url(#plBall)"/></g>
  <circle cx="170" cy="124" r="7" fill="url(#plBall)"/>

  <!-- Title chip top-left -->
  <g transform="translate(16, 16)">
    <rect width="80" height="22" rx="4" fill="rgba(0,0,0,0.55)" stroke="rgba(245,196,81,0.5)" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" font-family="EB Garamond, serif" font-size="11" letter-spacing="3" font-weight="700" fill="#f5c451">PLINKO</text>
  </g>
</svg>
