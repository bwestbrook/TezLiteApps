<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sqBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e3b22"/>
      <stop offset="100%" stop-color="#07291a"/>
    </linearGradient>
    <linearGradient id="sqGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c451"/>
      <stop offset="100%" stop-color="#d4a24e"/>
    </linearGradient>
    <radialGradient id="sqVignette" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="240" fill="url(#sqBg)"/>
  <rect width="400" height="240" fill="url(#sqVignette)"/>

  <!-- 10×10 grid, centered -->
  <g transform="translate(116, 38)">
    <!-- column header row (axis Away) -->
    <g font-family="EB Garamond, serif" font-weight="700" font-size="11" fill="#f5c451" text-anchor="middle">
      <text x="-12" y="-6" font-size="9" opacity="0.7">H\A</text>
      <text x="9" y="-6">3</text>
      <text x="26" y="-6">7</text>
      <text x="43" y="-6">0</text>
      <text x="60" y="-6">4</text>
      <text x="77" y="-6">1</text>
      <text x="94" y="-6">8</text>
      <text x="111" y="-6">6</text>
      <text x="128" y="-6">2</text>
      <text x="145" y="-6">9</text>
      <text x="162" y="-6">5</text>
    </g>
    <!-- row header column (axis Home) -->
    <g font-family="EB Garamond, serif" font-weight="700" font-size="11" fill="#f5c451" text-anchor="end">
      <text x="-4" y="13">0</text>
      <text x="-4" y="30">7</text>
      <text x="-4" y="47">3</text>
      <text x="-4" y="64">4</text>
      <text x="-4" y="81">1</text>
      <text x="-4" y="98">9</text>
      <text x="-4" y="115">6</text>
      <text x="-4" y="132">2</text>
      <text x="-4" y="149">8</text>
      <text x="-4" y="166">5</text>
    </g>

    <!-- 10×10 cells -->
