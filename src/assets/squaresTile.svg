      </g>
      <!-- score callout chip -->
      <g transform="translate(85, 153)" font-family="EB Garamond, serif" font-weight="700" fill="#0e1116">
        <rect x="50" y="0" width="18" height="17" fill="#fff"/>
        <text x="59" y="13" text-anchor="middle" font-size="11">$</text>
      </g>
    </g>
  </g>

  <!-- Title chip top-left -->
  <g transform="translate(16, 16)">
    <rect width="120" height="22" rx="4" fill="rgba(0,0,0,0.45)" stroke="rgba(245,196,81,0.5)" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" font-family="EB Garamond, serif" font-size="11" letter-spacing="3" font-weight="700" fill="#f5c451">SQUARES · 10×10</text>
