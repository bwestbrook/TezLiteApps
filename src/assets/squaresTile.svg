        <rect x="119" y="68"  width="17" height="17"/>
        <rect x="136" y="68"  width="17" height="17"/>
        <rect x="153" y="68"  width="17" height="17"/>

        <rect x="0"   y="85"  width="17" height="17"/>
        <rect x="17"  y="85"  width="17" height="17"/>
        <rect x="34"  y="85"  width="17" height="17"/>
        <rect x="51"  y="85"  width="17" height="17"/>
        <rect x="68"  y="85"  width="17" height="17"/>
        <rect x="85"  y="85"  width="17" height="17"/>
        <rect x="102" y="85"  width="17" height="17"/>
        <rect x="119" y="85"  width="17" height="17"/>
        <rect x="136" y="85"  width="17" height="17"/>
        <rect x="153" y="85"  width="17" height="17"/>

        <rect x="0"   y="102" width="17" height="17"/>
        <rect x="17"  y="102" width="17" height="17"/>
